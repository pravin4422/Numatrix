<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Sum Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- GAME OVER overlay -->
<div class="overlay gameover" id="gameoverOverlay">
  <div class="overlay-card">
    <div class="overlay-emoji">💔</div>
    <div class="overlay-title">Game Over</div>
    <div class="overlay-sub">No lives left. Try again!</div>
    <button class="overlay-btn" onclick="restartGame()">Try Again</button>
  </div>
</div>

<!-- COMPLETION CARD -->
<div class="completion-overlay" id="completionOverlay">
  <div class="completion-card">
    <button class="close-card-btn" onclick="closeCompletionCard()">✕</button>
    <div class="completion-emoji">🎉</div>
    <div class="completion-title">Level Complete!</div>
    <div class="completion-subtitle">Amazing work!</div>
    
    <div class="completion-stats">
      <div class="completion-stat primary">
        <div class="stat-icon">⏱️</div>
        <div class="stat-value" id="completionTime">0:00</div>
        <div class="stat-label">Your Time</div>
      </div>
      <div class="completion-stat">
        <div class="stat-icon">🏆</div>
        <div class="stat-value" id="completionBestTime">0:00</div>
        <div class="stat-label">Best Time</div>
      </div>
      <div class="completion-stat">
        <div class="stat-icon">⭐</div>
        <div class="stat-value" id="completionScore">0</div>
        <div class="stat-label">Score</div>
      </div>
    </div>

    <div class="completion-grid">
      <div class="completion-stat secondary">
        <div class="stat-icon">🔥</div>
        <div class="stat-value" id="completionStreak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="completion-stat secondary">
        <div class="stat-icon">💡</div>
        <div class="stat-value" id="hintsUsed">0</div>
        <div class="stat-label">Hints Used</div>
      </div>
      <div class="completion-stat secondary">
        <div class="stat-icon">↩️</div>
        <div class="stat-value" id="undosUsed">0</div>
        <div class="stat-label">Undos</div>
      </div>
      <div class="completion-stat secondary">
        <div class="stat-icon">❤️</div>
        <div class="stat-value" id="livesLeft">3</div>
        <div class="stat-label">Lives Left</div>
      </div>
    </div>

    <button class="share-btn" onclick="shareResults()">📤 Share with Friends</button>
  </div>
</div>

<!-- PURCHASE UNDO MODAL -->
<div class="purchase-overlay" id="purchaseUndoModal">
  <div class="purchase-card">
    <div class="purchase-icon">↩️</div>
    <div class="purchase-title">No Undos Left!</div>
    <div class="purchase-desc">Buy 3 more undos for 20 💎 gems?</div>
    <div class="purchase-buttons">
      <button class="purchase-btn cancel" onclick="closePurchaseModal()">Cancel</button>
      <button class="purchase-btn confirm" onclick="confirmPurchaseUndo()">Buy (20 💎)</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ══ PAGE ══ -->

<!-- Currency bar -->
<div class="currency-bar">
  <div class="currency-pill"><span class="ci">🪙</span><span class="cv" id="coinBar">0</span></div>
  <div class="currency-pill"><span class="ci">💎</span><span class="cv" id="gemBar">0</span></div>
  <div class="currency-pill"><span class="ci">🎒</span><span class="cv" id="bagBar">0</span></div>
</div>

<!-- Header -->
<div class="header">
  <button class="profile-btn" onclick="window.location.href='profile.html'" title="Profile">
    <span class="profile-icon">👤</span>
  </button>
  <div class="header-center">
    <div class="difficulty-badge">EASY</div>
    <div class="level-title" id="levelTitle">Level 1</div>
  </div>
  <button class="icon-btn" onclick="restartGame()">↺</button>
</div>

<!-- Hearts -->
<div class="hearts" id="hearts"></div>

<!-- Timer -->
<div class="timer" id="timer">00:00</div>

<!-- Puzzle -->
<div class="puzzle-wrap">
  <div class="grid-container" id="grid"></div>
</div>

<!-- Controls -->
<div class="controls">
  <div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="eraseBtn" onclick="setMode('erase')">🧹</button>
      <button class="mode-btn" id="confirmBtn" onclick="setMode('confirm')">✏️</button>
    </div>
    <div class="mode-label" id="modeLabel">ERASE MODE</div>
  </div>

  <div class="controls-btns">
    <button class="circ-btn undo-btn" id="undoBtn" onclick="useUndo()">
      ↩️<span class="circ-badge" id="undoCount">5</span>
    </button>
    <button class="circ-btn hint-btn" onclick="useHint()">
      💡<span class="circ-badge" id="hintCount">3</span>
    </button>
    <button class="circ-btn bag-btn" title="Hint Bag">
      🎒<span class="circ-badge" id="bagCount">0</span>
    </button>
    <button class="circ-btn shop-btn" onclick="window.location.href='/level_pages/shop/shop.html?tab=hints'" title="Shop">
      🛍️
    </button>
  </div>
</div>

<!-- Next level -->
<div id="nextLevelWrap" style="display:none; margin-top:24px;">
  <button class="next-level-btn">Next →</button>
</div>

<script src="game.js"></script>
</body>
</html>
